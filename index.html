<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; background: #212121; color: #ececec; }

  /* Sidebar */
  .sidebar { width: 300px; min-width: 300px; background: #171717; display: flex; flex-direction: column; border-left: 1px solid #2f2f2f; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #2f2f2f; display: flex; align-items: center; gap: 10px; }
  .sidebar-header h2 { font-size: 18px; font-weight: 600; }
  .sidebar-header .badge { background: #10a37f; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }

  .search-box { padding: 12px 16px; }
  .search-box input { width: 100%; padding: 8px 12px; background: #2f2f2f; border: 1px solid #3f3f3f; border-radius: 8px; color: #ececec; font-size: 13px; outline: none; }
  .search-box input:focus { border-color: #10a37f; }

  .sidebar-content { flex: 1; overflow-y: auto; padding: 8px 0; }

  /* Project & Topic */
  .project { border-bottom: 1px solid #2a2a2a; }
  .project-header, .topic-header { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; user-select: none; transition: background 0.2s; }
  .project-header:hover, .topic-header:hover { background: #2a2a2a; }
  .project-header { font-weight: 600; color: #ececec; }
  .topic-header { padding-right: 32px; font-weight: 500; color: #b4b4b4; }
  .project-header .arrow, .topic-header .arrow { font-size: 10px; transition: transform 0.2s; }
  .project-header .arrow.collapsed, .topic-header .arrow.collapsed { transform: rotate(-90deg); }
  .project-icon { font-size: 16px; }
  .project-body, .topic-body { display: block; }

  /* Session Entry */
  .entry { padding: 8px 16px 8px 48px; cursor: pointer; font-size: 13px; color: #b4b4b4; border-radius: 4px; margin: 1px 8px; transition: all 0.15s; }
  .entry:hover { background: #2a2a2a; color: #ececec; }
  .entry.active { background: #10a37f22; color: #10a37f; border-right: 2px solid #10a37f; }
  .entry .date { font-size: 11px; color: #666; margin-top: 2px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
  .main .placeholder { text-align: center; max-width: 500px; }
  .main .placeholder .icon { font-size: 48px; margin-bottom: 16px; }
  .main .placeholder h1 { font-size: 24px; margin-bottom: 8px; }
  .main .placeholder p { color: #999; font-size: 14px; line-height: 1.6; }

  /* Conversation View */
  .conversation-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .conversation-view.visible { display: flex; }
  .conv-header { padding: 16px 24px; border-bottom: 1px solid #2f2f2f; }
  .conv-header h2 { font-size: 18px; font-weight: 600; }
  .conv-header .meta { font-size: 12px; color: #999; margin-top: 4px; display: flex; gap: 16px; }
  .conv-messages { flex: 1; overflow-y: auto; padding: 24px; }
  .msg { margin-bottom: 20px; max-width: 800px; }
  .msg .role { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #10a37f; margin-bottom: 4px; }
  .msg.user .role { color: #8e8ea0; }
  .msg .text { font-size: 14px; line-height: 1.7; color: #ececec; white-space: pre-wrap; }
  .github-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #10a37f; text-decoration: none; margin-top: 8px; }
  .github-link:hover { text-decoration: underline; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 3px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <span>🧠</span>
    <h2>Memory</h2>
    <span class="badge" id="convCount">0</span>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="ابحث في المحادثات..." oninput="filterConversations(this.value)">
  </div>
  <div class="sidebar-content" id="sidebarContent"></div>
</div>

<!-- Main -->
<div class="main" id="mainPlaceholder">
  <div class="placeholder">
    <div class="icon">💬</div>
    <h1>اختر محادثة</h1>
    <p>من القايمة على الشمال، اختار أي محادثة قديمة عشان تشوف التفاصيل</p>
  </div>
</div>

<!-- Conversation View -->
<div class="conversation-view" id="convView">
  <div class="conv-header">
    <h2 id="convTitle"></h2>
    <div class="meta">
      <span id="convDate"></span>
      <span id="convDir"></span>
      <a id="convGithub" class="github-link" target="_blank">🔗 GitHub</a>
    </div>
  </div>
  <div class="conv-messages" id="convMessages"></div>
</div>

<script>
let memoryData = { projects: {} };
const conversations = {}; // id -> messages

// Load memory.json
async function loadMemory() {
  try {
    const res = await fetch('./opencode-memory.json');
    memoryData = await res.json();
  } catch {}
  
  // Load conversation files
  const convFiles = [
    ["ses_12d53c276ffe7ImTUiGJAUhmBC", "2026-06-17_ما-هو-Aider-ونظام-الذاكرة.json"]
  ];
  for (const [id, file] of convFiles) {
    try {
      const r = await fetch('conversations/' + file);
      const data = await r.json();
      conversations[id] = data.messages || [];
      if (!memoryData.projects[data.directory]) memoryData.projects[data.directory] = { name: data.directory, topics: {} };
    } catch {}
  }

  renderSidebar();
}

function renderSidebar() {
  const container = document.getElementById('sidebarContent');
  container.innerHTML = '';
  let total = 0;

  for (const [projPath, proj] of Object.entries(memoryData.projects || {})) {
    const projDiv = document.createElement('div');
    projDiv.className = 'project';
    
    const projHeader = document.createElement('div');
    projHeader.className = 'project-header';
    projHeader.innerHTML = `<span class="arrow">▼</span><span class="project-icon">📁</span> ${proj.name || projPath}`;
    
    const projBody = document.createElement('div');
    projBody.className = 'project-body';

    for (const [topicName, topic] of Object.entries(proj.topics || {})) {
      const topicDiv = document.createElement('div');
      const topicHeader = document.createElement('div');
      topicHeader.className = 'topic-header';
      topicHeader.innerHTML = `<span class="arrow">▼</span> ${topicName}`;

      const topicBody = document.createElement('div');
      topicBody.className = 'topic-body';

      for (const entry of (topic.entries || []).slice().reverse()) {
        total++;
        const entryDiv = document.createElement('div');
        entryDiv.className = 'entry';
        entryDiv.dataset.sessionId = entry.session_id || '';
        entryDiv.dataset.githubUrl = entry.github_url || '';
        entryDiv.innerHTML = `<div>${entry.summary}</div><div class="date">${entry.date} · ${entry.directory}</div>`;
        entryDiv.onclick = () => showConversation(entry, topicName);
        topicBody.appendChild(entryDiv);
      }

      topicHeader.onclick = () => {
        const body = topicHeader.nextElementSibling;
        const arrow = topicHeader.querySelector('.arrow');
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
        arrow.classList.toggle('collapsed');
      };

      topicDiv.appendChild(topicHeader);
      topicDiv.appendChild(topicBody);
      projBody.appendChild(topicDiv);
    }

    projHeader.onclick = () => {
      const body = projHeader.nextElementSibling;
      const arrow = projHeader.querySelector('.arrow');
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
      arrow.classList.toggle('collapsed');
    };

    projDiv.appendChild(projHeader);
    projDiv.appendChild(projBody);
    container.appendChild(projDiv);
  }

  document.getElementById('convCount').textContent = total;
}

function showConversation(entry, topicName) {
  document.getElementById('mainPlaceholder').style.display = 'none';
  const view = document.getElementById('convView');
  view.classList.add('visible');

  document.getElementById('convTitle').textContent = entry.summary;
  document.getElementById('convDate').textContent = '📅 ' + (entry.date || '');
  document.getElementById('convDir').textContent = '📂 ' + (entry.directory || '');
  const githubLink = document.getElementById('convGithub');
  if (entry.github_url) {
    githubLink.href = entry.github_url;
    githubLink.style.display = 'inline-flex';
  } else {
    githubLink.style.display = 'none';
  }

  const msgs = conversations[entry.session_id] || [];
  const container = document.getElementById('convMessages');
  container.innerHTML = '';

  if (msgs.length === 0) {
    container.innerHTML = '<div style="color:#666;text-align:center;padding:40px">التفاصيل الكاملة متاحة على GitHub 🌐</div>';
    return;
  }

  for (const m of msgs) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = `<div class="role">${m.role === 'user' ? 'أنت' : 'AI'}</div><div class="text">${escapeHtml(m.text)}</div>`;
    container.appendChild(div);
  }

  // Highlight active entry
  document.querySelectorAll('.entry').forEach(e => e.classList.remove('active'));
  document.querySelector(`.entry[data-session-id="${entry.session_id}"]`)?.classList.add('active');
}

function filterConversations(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.entry').forEach(e => {
    e.style.display = q === '' || e.textContent.toLowerCase().includes(q) ? 'block' : 'none';
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

loadMemory();
</script>

</body>
</html>
