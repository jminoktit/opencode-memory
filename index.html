<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode Sessions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; background: #212121; color: #ececec; overflow: hidden; }

  .sidebar { width: 320px; min-width: 320px; background: #171717; display: flex; flex-direction: column; border-left: 1px solid #2f2f2f; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #2f2f2f; display: flex; align-items: center; gap: 10px; }
  .sidebar-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
  .sidebar-header .badge { background: #10a37f; font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .search-box { padding: 10px 12px; }
  .search-box input { width: 100%; padding: 8px 12px; background: #2f2f2f; border: 1px solid #3f3f3f; border-radius: 8px; color: #ececec; font-size: 13px; outline: none; }
  .search-box input:focus { border-color: #10a37f; }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 4px 0; }

  .session-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #2a2a2a; transition: background 0.15s; }
  .session-item:hover { background: #2a2a2a; }
  .session-item.active { background: #10a37f18; border-right: 3px solid #10a37f; }
  .session-item .s-title { font-size: 13px; font-weight: 500; color: #ececec; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-item .s-meta { display: flex; gap: 10px; font-size: 11px; color: #777; flex-wrap: wrap; }
  .session-item .s-meta span { display: flex; align-items: center; gap: 3px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; }
  .placeholder-content { text-align: center; }
  .placeholder-content .icon { font-size: 48px; margin-bottom: 16px; }
  .placeholder-content h1 { font-size: 22px; margin-bottom: 8px; }
  .placeholder-content p { color: #999; font-size: 14px; }

  .conv-view { display: none; flex-direction: column; height: 100%; }
  .conv-view.visible { display: flex; }
  .conv-header { padding: 14px 20px; border-bottom: 1px solid #2f2f2f; }
  .conv-header h2 { font-size: 16px; font-weight: 600; }
  .conv-header .meta { font-size: 12px; color: #999; margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }

  .conv-messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { margin-bottom: 16px; max-width: 800px; }
  .msg.user { margin-right: auto; }
  .msg.assistant { margin-left: auto; }
  .msg .role { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
  .msg.user .role { color: #8e8ea0; }
  .msg.assistant .role { color: #10a37f; }
  .msg .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: #10a37f18; border: 1px solid #10a37f33; }
  .msg.assistant .bubble { background: #2f2f2f; border: 1px solid #3f3f3f; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  .loading { text-align: center; padding: 40px; color: #666; }
  .error { text-align: center; padding: 40px; color: #e74c3c; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span>💬</span>
    <h2>الجلسات</h2>
    <span class="badge" id="sessionCount">0</span>
    <button onclick="refreshData()" style="background:none;border:none;color:#777;cursor:pointer;font-size:16px" title="تحديث">🔄</button>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث في الجلسات..." oninput="filterSessions(this.value)">
  </div>
  <div class="sidebar-content" id="sidebarList"></div>
</div>

<div class="main">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-content">
      <div class="icon">💬</div>
      <h1>اختر جلسة</h1>
      <p>اختار أي جلسة من القايمة عشان تشوف المحادثة كاملة</p>
    </div>
  </div>

  <div class="conv-view" id="convView">
    <div class="conv-header">
      <h2 id="convTitle"></h2>
      <div class="meta">
        <span id="convDate"></span>
        <span id="convDir"></span>
        <span id="convModel"></span>
        <span id="convTokens"></span>
      </div>
    </div>
    <div class="conv-messages" id="convMessages"></div>
  </div>
</div>

<script>
let sessions = [];
let filteredSessions = [];

async function loadData() {
  const container = document.getElementById('sidebarList');
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';

  try {
    const res = await fetch('./sessions-data.json?' + Date.now());
    const data = await res.json();
    sessions = data.sessions || [];
  } catch {
    container.innerHTML = '<div class="error">فشل تحميل البيانات. نفّذ export.ps1 أولاً</div>';
    return;
  }

  filteredSessions = [...sessions];
  renderSidebar();
}

function renderSidebar() {
  const container = document.getElementById('sidebarList');
  container.innerHTML = '';

  document.getElementById('sessionCount').textContent = filteredSessions.length;

  for (const s of filteredSessions) {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.dataset.id = s.id;

    const date = s.date_created || '';
    const tokens = (parseInt(s.tokens_input) + parseInt(s.tokens_output)).toLocaleString();
    const dir = s.directory.split('\\').slice(-2).join('\\');

    div.innerHTML = `
      <div class="s-title">${escHtml(s.title || 'بلا عنوان')}</div>
      <div class="s-meta">
        <span>📅 ${date}</span>
        <span>💬 ${s.msg_count}</span>
        <span>📂 ${dir}</span>
        <span>⚡ ${tokens}</span>
      </div>
    `;
    div.onclick = () => showSession(s.id);
    container.appendChild(div);
  }
}

function showSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;

  document.getElementById('placeholder').style.display = 'none';
  const view = document.getElementById('convView');
  view.classList.add('visible');

  document.getElementById('convTitle').textContent = s.title || 'بلا عنوان';

  const tokens = (parseInt(s.tokens_input) + parseInt(s.tokens_output)).toLocaleString();
  document.getElementById('convDate').textContent = '📅 ' + (s.date_created || '');
  document.getElementById('convDir').textContent = '📂 ' + (s.directory || '');
  document.getElementById('convModel').textContent = '🤖 ' + (s.model || 'N/A');
  document.getElementById('convTokens').textContent = '⚡ ' + tokens + ' tokens';

  const container = document.getElementById('convMessages');
  container.innerHTML = '';

  if (!s.messages || s.messages.length === 0) {
    container.innerHTML = '<div style="color:#666;text-align:center;padding:40px">لا توجد رسائل في هذه الجلسة</div>';
  } else {
    for (const m of s.messages) {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.role === 'user' ? 'user' : 'assistant');
      div.innerHTML = `
        <div class="role">${m.role === 'user' ? 'أنت' : 'AI'}</div>
        <div class="bubble">${escHtml(m.text)}</div>
      `;
      container.appendChild(div);
    }
  }

  container.scrollTop = container.scrollHeight;

  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.session-item[data-id="${id}"]`)?.classList.add('active');
}

function filterSessions(query) {
  const q = query.toLowerCase();
  if (!q) {
    filteredSessions = [...sessions];
  } else {
    filteredSessions = sessions.filter(s =>
      (s.title && s.title.toLowerCase().includes(q)) ||
      (s.directory && s.directory.toLowerCase().includes(q)) ||
      (s.model && s.model.toLowerCase().includes(q))
    );
  }
  renderSidebar();

  const active = document.querySelector('.session-item.active');
  if (!active) {
    document.getElementById('convView').classList.remove('visible');
    document.getElementById('placeholder').style.display = 'flex';
  }
}

async function refreshData() {
  await loadData();
}

function escHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

loadData();
</script>

</body>
</html>
